# Reference-only skeleton blueprint snippet.
# Do not use this file for Torque execution; use blueprints/blueprint.yaml instead.
#
# Blueprint grain snippet (example)
spec_version: 2
grains:
  claim_standalone_cseries:
    kind: ansible
    spec:
      source:
        store: automation-repo
        path: rack-claim-to-intersight-saas/playbook.yaml
      agent:
        name: "{{ .inputs.agent }}"
      inventory-file:
        localhost:
          hosts:
            127.0.0.1:
              ansible_connection: local
          vars:
            api_key_id: "{{ .params.intersight_api_key_id }}"
            api_private_key: "{{ .params.intersight_api_private_key }}"
            validate_certs: false
      inputs:
        - device_serial_number: "{{ .inputs.device_serial_number }}"
        - device_claim_code: "{{ .inputs.device_claim_code }}"
      outputs:
        - claim_submitted
        - claim_changed
        - device_serial_number
        - claim_resource_path
      on-destroy:
        source:
          store: automation-repo
          path: rack-claim-to-intersight-saas/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              127.0.0.1:
                ansible_connection: local
