# Reference-only skeleton blueprint snippet.
# Do not use this file for Torque execution; use blueprints/blueprint.yaml instead.
#
# Blueprint grain snippet (example)
spec_version: 2
grains:
  claim_fabric_interconnect:
    kind: ansible
    spec:
      source:
        store: automation-repo
        path: fi-claim-to-intersight-saas/playbook.yaml
      agent:
        name: "{{ .inputs.agent }}"
      inventory-file:
        localhost:
          hosts:
            127.0.0.1:
              ansible_connection: local
          vars:
         #   api_key_id: "{{ .inputs.intersight_api_key_id }}"
         #   api_private_key: "{{ .inputs.intersight_api_private_key }}"
            validate_certs: false
      inputs:
        - fi_serial_number: "{{ .inputs.fi_serial_number }}"
        - fi_claim_code: "{{ .inputs.fi_claim_code }}"
        - api_key_id: "{{ .inputs.intersight_api_key_id }}"
        - api_private_key: "{{ .inputs.intersight_api_private_key }}"
      outputs:
        - claim_submitted
        - claim_changed
        - fi_serial_number
        - claim_resource_path
      on-destroy:
        source:
          store: automation-repo
          path: fi-claim-to-intersight-saas/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              127.0.0.1:
                ansible_connection: local
