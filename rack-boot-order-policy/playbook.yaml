---
# ansible/configure-boot-order-policy/playbook.yaml
- name: Configure Intersight Boot Order Policy ( Torque-compatible)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    api_info: &api_info
      api_private_key: "{{ api_private_key | default(omit) }}"
      api_key_id: "{{ api_key_id | default(omit) }}"
      api_uri: "{{ api_uri | default(omit) }}"
      validate_certs: "{{ validate_certs | default(true) | bool }}"
      state: "{{ state | default('present') }}"

    org_name: "{{ organization | default('default') }}"
    boot_policy_name: "{{ boot_policy_name | default('jv-boot-policy') }}"
    boot_policy_description: "{{ boot_policy_description | default('Boot Order policy for Standalone-JV') }}"
    configured_boot_mode: "{{ configured_boot_mode | default('Uefi') }}"
    site_tag_value: "{{ site_tag_value | default('AIPOD') }}"
    boot_devices: "{{ boot_devices | default(default_boot_devices) }}"
    default_boot_devices:
      - device_type: "Local Disk"
        controller_slot: "MSTOR-RAID"
      - device_type: "Virtual Media"
        device_name: "vmedia"

  pre_tasks:
    - name: Validate required API inputs
      ansible.builtin.assert:
        that:
          - (api_key_id is defined and api_key_id | length > 0) or (lookup('ansible.builtin.env', 'INTERSIGHT_API_KEY_ID') | length > 0)
          - (api_private_key is defined and api_private_key | length > 0) or (lookup('ansible.builtin.env', 'INTERSIGHT_API_PRIVATE_KEY') | length > 0)
        fail_msg: >-
          Missing Intersight authentication. Provide api_key_id and api_private_key
          (inventory/extra-vars) or set INTERSIGHT_API_KEY_ID and
          INTERSIGHT_API_PRIVATE_KEY environment variables.
      tags:
        - always
        - validate

  tasks:
    - name: Configure Boot Order Policy
      cisco.intersight.intersight_boot_order_policy:
        <<: *api_info
        organization: "{{ org_name }}"
        name: "{{ boot_policy_name }}"
        description: "{{ boot_policy_description }}"
        tags:
          - Key: "managed_by"
            Value: "{{ managed_by_tag | default('Jarvis') }}"
          - Key: "site"
            Value: "{{ site_tag_value }}"
          - Key: "environment"
            Value: "{{ environment | default('dev') }}"
        configured_boot_mode: "{{ configured_boot_mode }}"
        boot_devices: "{{ boot_devices }}"
      register: boot_policy_result
      no_log: false
      tags:
        - boot
        - policies
        - intersight

    - name: Build output facts
      ansible.builtin.set_fact:
        output_boot_policy_name: "{{ boot_policy_name }}"
        output_boot_policy_org: "{{ org_name }}"
        output_boot_policy_state: "{{ state | default('present') }}"
        output_boot_policy_changed: "{{ boot_policy_result.changed | default(false) | bool }}"
      tags:
        - outputs
        - boot

    - name: Export outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          boot_policy_name: "{{ output_boot_policy_name }}"
          boot_policy_org: "{{ output_boot_policy_org }}"
          boot_policy_state: "{{ output_boot_policy_state }}"
          boot_policy_changed: "{{ output_boot_policy_changed }}"
      delegate_to: localhost
      run_once: true
      tags:
        - always
      ignore_errors: true

  post_tasks:
    - name: Final production gate - verify task completion
      ansible.builtin.assert:
        that:
          - boot_policy_result is defined
          - boot_policy_result.failed is not defined or not boot_policy_result.failed
        fail_msg: Boot Order Policy configuration failed.
        success_msg: Boot Order Policy configuration completed successfully.
      tags:
        - always
        - validate
