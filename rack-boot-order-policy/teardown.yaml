---
# ansible/configure-boot-order-policy/teardown.yaml
- name: Remove Intersight Boot Order Policy (on-destroy)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    api_info: &api_info
      api_private_key: "{{ api_private_key | default(omit) }}"
      api_key_id: "{{ api_key_id | default(omit) }}"
      api_uri: "{{ api_uri | default(omit) }}"
      validate_certs: "{{ validate_certs | default(true) | bool }}"

    org_name: "{{ organization | default('default') }}"
    boot_policy_name: "{{ boot_policy_name | default('jv-boot-policy') }}"

  tasks:
    - name: Delete Boot Order Policy
      cisco.intersight.intersight_boot_order_policy:
        <<: *api_info
        organization: "{{ org_name }}"
        name: "{{ boot_policy_name }}"
        state: absent
      register: boot_policy_delete_result
      no_log: true
      tags:
        - boot
        - policies
        - teardown

    - name: Export teardown outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          teardown_status: "completed"
          deleted_boot_policy_name: "{{ boot_policy_name }}"
      delegate_to: localhost
      run_once: true
      tags:
        - always
      ignore_errors: true