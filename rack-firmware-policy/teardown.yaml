---
# ansible/configure-firmware-policy/teardown.yaml
- name: Remove Intersight Firmware Policy (on-destroy)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    api_info: &api_info
      api_private_key: "{{ api_private_key | default(omit) }}"
      api_key_id: "{{ api_key_id | default(omit) }}"
      api_uri: "{{ api_uri | default(omit) }}"
      validate_certs: "{{ validate_certs | default(true) | bool }}"

    org_name: "{{ organization | default('default') }}"
    firmware_policy_name: "{{ firmware_policy_name | default('jv-firmware-policy') }}"

  tasks:
    - name: Delete firmware policy
      cisco.intersight.intersight_firmware_policy:
        <<: *api_info
        organization: "{{ org_name }}"
        name: "{{ firmware_policy_name }}"
        state: absent
      register: firmware_policy_delete_result
      no_log: true
      tags:
        - firmware
        - policies
        - teardown

    - name: Export teardown outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          teardown_status: "completed"
          deleted_firmware_policy_name: "{{ firmware_policy_name }}"
      delegate_to: localhost
      run_once: true
      tags:
        - always
      ignore_errors: true
