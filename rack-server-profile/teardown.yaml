---
# ansible/configure-server-profile/teardown.yaml
- name: Remove Intersight Server Profile (on-destroy)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    api_info: &api_info
      api_private_key: "{{ api_private_key | default(omit) }}"
      api_key_id: "{{ api_key_id | default(omit) }}"
      api_uri: "{{ api_uri | default(omit) }}"
      validate_certs: "{{ validate_certs | default(true) | bool }}"

    org_name: "{{ organization | default('default') }}"
    server_profile_name: "{{ server_profile_name | default('SP-Server1') }}"

  tasks:
    - name: Delete server profile
      cisco.intersight.intersight_server_profile:
        <<: *api_info
        organization: "{{ org_name }}"
        name: "{{ server_profile_name }}"
        state: absent
      register: server_profile_delete_result
      no_log: false
      tags:
        - profile
        - teardown
        - intersight

    - name: Export teardown outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          teardown_status: "completed"
          deleted_server_profile_name: "{{ server_profile_name }}"
      delegate_to: localhost
      run_once: true
      tags:
        - always
      ignore_errors: true
