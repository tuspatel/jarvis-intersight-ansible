---
# ansible/create-deploy-standalone-profile/playbook.yaml
- name: Create and deploy standalone server profile ( Torque-compatible)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    api_info: &api_info
      api_private_key: "{{ api_private_key | default(omit) }}"
      api_key_id: "{{ api_key_id | default(omit) }}"
      api_uri: "{{ api_uri | default(omit) }}"
      validate_certs: "{{ validate_certs | default(true) | bool }}"
      state: "{{ state | default('present') }}"

    org_name: "{{ organization | default('default') }}"
    server_profile_name: "{{ server_profile_name | default('Standalone_Profile') }}"
    target_platform: "{{ target_platform | default('Standalone') }}"
    profile_state: "{{ profile_state | default('present') }}"
    boot_policy_moid: "{{ boot_policy_moid | default(boot_order_policy.intersight_mo.Moid | default('')) }}"
    firmware_policy_moid: "{{ firmware_policy_moid | default(firmware_policy.intersight_mo.Moid | default('')) }}"

  pre_tasks:
    - name: Validate required API and profile inputs
      ansible.builtin.assert:
        that:
          - (api_key_id is defined and api_key_id | length > 0) or (lookup('ansible.builtin.env', 'INTERSIGHT_API_KEY_ID') | length > 0)
          - (api_private_key is defined and api_private_key | length > 0) or (lookup('ansible.builtin.env', 'INTERSIGHT_API_PRIVATE_KEY') | length > 0)
          - org_name | length > 0
          - server_profile_name | length > 0
          - target_platform | length > 0
          - profile_state in ['present', 'absent']
          - boot_policy_moid | length > 0
          - firmware_policy_moid | length > 0
        fail_msg: >-
          Missing/invalid inputs. Required: API credentials, organization,
          server_profile_name, target_platform, boot_policy_moid, firmware_policy_moid.
      tags:
        - always
        - validate

  tasks:
    - name: Create or update standalone server profile
      cisco.intersight.intersight_server_profile:
        <<: *api_info
        organization: "{{ org_name }}"
        name: "{{ server_profile_name }}"
        target_platform: "{{ target_platform }}"
        state: "{{ profile_state }}"
        boot_order_policy:
          - moid: "{{ boot_policy_moid }}"
        firmware_policy:
          - moid: "{{ firmware_policy_moid }}"
        tags:
          - Key: "managed_by"
            Value: "{{ managed_by_tag | default('Jarvis') }}"
          - Key: "environment"
            Value: "{{ environment | default('dev') }}"
      register: standalone_profile_result
      no_log: true
      tags:
        - profile
        - deploy
        - intersight

    - name: Build output facts
      ansible.builtin.set_fact:
        output_profile_name: "{{ server_profile_name }}"
        output_profile_org: "{{ org_name }}"
        output_profile_state: "{{ profile_state }}"
        output_profile_changed: "{{ standalone_profile_result.changed | default(false) | bool }}"
        output_boot_policy_moid: "{{ boot_policy_moid }}"
        output_firmware_policy_moid: "{{ firmware_policy_moid }}"
      tags:
        - outputs
        - profile

    - name: Export outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          server_profile_name: "{{ output_profile_name }}"
          server_profile_org: "{{ output_profile_org }}"
          server_profile_state: "{{ output_profile_state }}"
          server_profile_changed: "{{ output_profile_changed }}"
          boot_policy_moid: "{{ output_boot_policy_moid }}"
          firmware_policy_moid: "{{ output_firmware_policy_moid }}"
      delegate_to: localhost
      run_once: true
      tags:
        - always
      ignore_errors: true

  post_tasks:
    - name: Final production gate - verify profile operation success
      ansible.builtin.assert:
        that:
          - standalone_profile_result is defined
          - standalone_profile_result.failed is not defined or not standalone_profile_result.failed
        fail_msg: Standalone server profile operation failed.
        success_msg: Standalone server profile operation completed successfully.
      tags:
        - always
        - validate
