# Reference-only skeleton blueprint snippet.
# Do not use this file for Torque execution; use blueprints/blueprint.yaml instead.
#
# Blueprint grain snippet (example)
spec_version: 2
grains:
  configure_server_profile:
    kind: ansible
    spec:
      source:
        store: automation-repo
        path: rack-server-profile/playbook.yaml
      agent:
        name: "{{ .inputs.agent }}"
      inventory-file:
        localhost:
          hosts:
            127.0.0.1:
              ansible_connection: local
          vars:
            api_key_id: "{{ .params.intersight_api_key_id }}"
            api_private_key: "{{ .params.intersight_api_private_key }}"
            validate_certs: false
      inputs:
        - organization: "{{ .inputs.organization }}"
        - server_profile_name: "{{ .inputs.server_profile_name }}"
        - target_platform: "{{ .inputs.target_platform }}"
        - assigned_server: "{{ .inputs.assigned_server }}"
        - boot_order_policy: "{{ .inputs.boot_order_policy }}"
        - firmware_policy: "{{ .inputs.firmware_policy }}"
      outputs:
        - server_profile_name
        - server_profile_org
        - server_profile_state
        - server_profile_changed
        - assigned_server
      on-destroy:
        source:
          store: automation-repo
          path: rack-server-profile/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              127.0.0.1:
                ansible_connection: local
        inputs:
          - organization: "{{ .inputs.organization }}"
          - server_profile_name: "{{ .inputs.server_profile_name }}"
          - api_key_id: "{{ .params.intersight_api_key_id }}"
          - api_private_key: "{{ .params.intersight_api_private_key }}"
